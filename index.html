<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f14" />
  <title>🕺 Dance Pose - 춤 배우기</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <!-- 시작 화면 -->
    <div id="startScreen" class="screen active">
      <div class="start-content">
        <h1>🕺 Dance Pose</h1>
        <p class="subtitle">카메라 앞에서 포즈를 따라해보세요</p>
        <div class="info-box">
          <p>📷 카메라 권한이 필요합니다</p>
          <p>💡 밝은 곳에서, 전신이 보이도록 서주세요</p>
          <p>🎯 각 포즈를 1.5초간 유지하면 성공!</p>
        </div>
        <button id="startBtn" class="primary-btn">시작하기</button>
      </div>
    </div>

    <!-- 게임 화면 -->
    <div id="gameScreen" class="screen">
      <div class="top-bar">
        <div class="progress-info">
          <span id="stepLabel">1 / 4</span>
          <span id="poseName">준비 중...</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div class="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>

        <!-- 포즈 가이드 오버레이 -->
        <div id="poseGuide" class="pose-guide">
          <div id="poseEmoji" class="pose-emoji">🙌</div>
          <div id="poseInstruction" class="pose-instruction">양손을 머리 위로 올리세요</div>
        </div>

        <!-- 타이머 원 -->
        <div id="holdTimer" class="hold-timer hidden">
          <svg viewBox="0 0 100 100">
            <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
            <circle id="timerCircle" class="timer-fg" cx="50" cy="50" r="45"></circle>
          </svg>
          <div id="timerText" class="timer-text">0.0</div>
        </div>

        <!-- 성공 오버레이 -->
        <div id="successOverlay" class="success-overlay hidden">
          <div class="success-text">✨ 성공! ✨</div>
        </div>

        <!-- 로딩 오버레이 -->
        <div id="loadingOverlay" class="loading-overlay">
          <div class="spinner"></div>
          <div id="loadingText">AI 모델 로딩 중...</div>
        </div>
      </div>

      <div class="bottom-bar">
        <div id="feedback" class="feedback">카메라 앞에 전신이 보이도록 서주세요</div>
      </div>
    </div>

    <!-- 완료 화면 -->
    <div id="endScreen" class="screen">
      <div class="end-content">
        <div class="celebration">🎉</div>
        <h1>수고하셨어요!</h1>
        <p class="subtitle">모든 포즈를 완료했습니다</p>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">소요 시간</div>
            <div id="totalTime" class="stat-value">0초</div>
          </div>
          <div class="stat">
            <div class="stat-label">완료 포즈</div>
            <div id="totalPoses" class="stat-value">0개</div>
          </div>
        </div>
        <button id="restartBtn" class="primary-btn">다시 하기</button>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
